project:
  type: book
  output-dir: docs

book:
  title: "Pharmacie Hospitalière - Atlas des Ressources Essentielles"
  favicon: images/logo/favicon.png
  author: "Marvin JACQUET"
  date: last-modified
  date-format: "DD MMMM YYYY"
  language: fr

  sidebar:
    logo: images/logo/full.svg
    search: true
    location: left
    style: "docked"
    background: light

  chapters:
    - index.qmd
    - part: "Outils cliniques"
      chapters:
        - interactions.qmd
        - adaptation.qmd
        - iatrogenic.qmd
        - compatibilite.qmd
    - part: "Ressources"
      chapters:
        - recommandations.qmd
        - etp.qmd
        - pharmacologie.qmd
        - conversions.qmd
        - ruptures.qmd


format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-title: "Sur cette page"
    number-sections: false
    smooth-scroll: true
    lang: fr
    css: styles.css
    grid:
      sidebar-width: 280px
      body-width: 900px
      margin-width: 200px
