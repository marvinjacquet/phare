project:
  type: book
  output-dir: docs

execute:
  freeze: auto

book:
  title: "Pharmacie Hospitalière - Atlas des Ressources Essentielles"
  favicon: images/favicon.ico
  author:
    - name: Marvin JACQUET
      orcid: 0000-0002-9890-7908
      url: https://marvinjacquet.github.io/
  date: last-modified
  date-format: "DD MMMM YYYY"
  doi: 10.5281/zenodo.20612426
  repo-branch: main
  repo-url: https://github.com/marvinjacquet/phare
  repo-actions: [issue]
  language: fr

  sidebar:
    logo: images/phare.svg
    search: true
    location: left
    style: "docked"
    background: light

  chapters:
    - index.qmd
    - index-outils.qmd
    - part: "**1. Référentiels**"
      chapters: 
        - referentiels/filler.qmd
    - part: "**2. Interactions**"
      chapters: 
        - interactions/filler.qmd
    - part: "**3. Iatrogénie**"
      chapters: 
        - iatrogenie/filler.qmd
    - part: "**Adaptation posologique**"
      chapters: 
        - adaptation/filler.qmd  
    - part: "**Déprescription**"
      chapters: 
        - deprescription/filler.qmd
    - part: "**Stabilité physico-chimique**"
      chapters: 
        - stabilite/filler.qmd 
    - part: "**Education thérapeutique**"
      chapters: 
        - education/filler.qmd 
    - part: "**Calculs et conversions**"
      chapters: 
        - calculs/filler.qmd
    - part: "**Recommandations**"
      chapters: 
        - recommandations/filler.qmd
    - part: "**Disponibilité et accès**"
      chapters: 
        - disponibilite/filler.qmd
    - part: "**Autres outils**"
      chapters:
        - autre/filler.qmd
    - part: "**Archive**"
      chapters:
        - recommandations.qmd
        - etp.qmd
        - pharmacologie.qmd
        - conversions.qmd
        - ruptures.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    engine: knitr
    toc: true
    toc-depth: 3
    toc-title: "Sur cette page"
    number-sections: false
    smooth-scroll: true
    lang: fr
    css: styles.css
    grid:
      sidebar-width: 280px
      body-width: 900px
      margin-width: 200px
